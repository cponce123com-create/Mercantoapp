kind = "web"
previewPath = "/"
title = "Mercanto"
version = "1.0.0"
id = "artifacts/mercanto"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24577

[services.development]
run = "pnpm --filter @workspace/mercanto run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mercanto", "run", "build" ]
publicDir = "artifacts/mercanto/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24577"
BASE_PATH = "/"
